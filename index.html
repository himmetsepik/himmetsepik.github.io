<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himmet Sepik | Links</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/icon.png">
</head>
<body>

    <main class="container">

        <section class="profile-card">
            <div class="avatar">
                <img src="assets/avatar.png" alt="Himmet Sepik Avatar">
            </div>

            <h1>Himmet Sepik</h1>
            <p class="bio">
                Tüm profillerim ve bağlantılarım
            </p>
        </section>

        <section class="links">

            <a href="https://github.com/himmetsepik" target="_blank" class="link-button">
                <img src="assets/github.png" alt="GitHub Logo" class="logo">
                <span>GitHub</span>
            </a>

            <a href="https://www.codester.com/himmetsepik/" target="_blank" class="link-button">
                <img src="assets/codester.png" alt="Codester Logo" class="logo">
                <span>Codester</span>
            </a>

            <a href="https://himmetsepik.gumroad.com/" target="_blank" class="link-button">
                <img src="assets/gumroad.png" alt="Gumroad Logo" class="logo">
                <span>Gumroad</span>
            </a>

            <a href="https://instagram.com/himmetsepik_" target="_blank" class="link-button">
                <img src="assets/instagram.png" alt="Instagram Logo" class="logo">
                <span>Instagram</span>
            </a>

            <a href="https://www.tiktok.com/@himmetsepik_" target="_blank" class="link-button">
                <img src="assets/tiktok.png" alt="TikTok Logo" class="logo">
                <span>TikTok</span>
            </a>

        </section>

        <footer>
            <p>© 2026 Himmet Sepik</p>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
